        isEnabled:
          type: boolean
        isDefault:
          type: boolean
      required: [code, symbol, rate, isEnabled, isDefault]

    StoreSettings:
      type: object
      properties:
        id:
          type: integer
        storeName:
          type: string
        logoUrl:
          type: string
          nullable: true
        codEnabled:
          type: boolean
        defaultCurrency:
          type: string
        currencies:
          type: array
          items:
            $ref: "#/components/schemas/CurrencySetting"
        updatedAt:
          type: string
          format: date-time
      required: [id, storeName, codEnabled, defaultCurrency, currencies, updatedAt]

    UpdateSettingsBody:
      type: object
      properties:
        storeName:
          type: string
        logoUrl:
          type: string
          nullable: true
        codEnabled:
          type: boolean
        defaultCurrency:
          type: string
        currencies:
          type: array
          items:
