name: SaaS CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Type Check (API)
        run: pnpm --filter @workspace/api-server run type-check

      - name: Type Check (Storefront)
        run: pnpm --filter @workspace/storefront-next run type-check

      - name: Linting
        run: pnpm run lint

      - name: Build Validation
        run: pnpm run build
